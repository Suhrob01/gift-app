<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <title>Gift Battle</title>

  <style>
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Arial,sans-serif;
      background:#f4f5f8;
      color:#111;
      overflow-x:hidden;
    }
    .app{padding:18px 16px 95px}
    .hero{
      background:linear-gradient(180deg,#fff,#f4f5f8);
      border-radius:0 0 34px 34px;
      text-align:center;
      padding:20px 12px 18px;
      position:relative;
      overflow:hidden;
    }
    .stars{
      position:absolute;inset:0;
      background:
        radial-gradient(circle at 15% 25%,#ffb13b 0 3px,transparent 4px),
        radial-gradient(circle at 70% 18%,#ff7d4d 0 4px,transparent 5px),
        radial-gradient(circle at 82% 45%,#ffd25d 0 3px,transparent 4px),
        radial-gradient(circle at 30% 60%,#ff9f3d 0 4px,transparent 5px);
      opacity:.8;
      animation:spark 2.8s infinite alternate;
    }
    @keyframes spark{from{transform:scale(1)}to{transform:scale(1.08)}}
    .avatar{
      width:92px;height:92px;border-radius:50%;
      margin:10px auto 12px;
      background:linear-gradient(135deg,#252b4a,#6b8cff);
      border:4px solid #fff;
      box-shadow:0 10px 25px rgba(0,0,0,.15);
      position:relative;z-index:2;
      display:flex;align-items:center;justify-content:center;
      font-size:42px;
    }
    h1{margin:0;font-size:32px;position:relative;z-index:2}
    .sub{font-size:16px;line-height:1.35;color:#333;position:relative;z-index:2;margin:10px 0}
    .balance{
      position:absolute;top:16px;right:18px;z-index:3;
      font-weight:900;font-size:18px;
    }
    .tabs{
      display:flex;gap:8px;justify-content:center;margin-top:15px;position:relative;z-index:2
    }
    .tab{
      border:0;border-radius:999px;padding:10px 18px;
      font-size:16px;font-weight:800;background:#e9eaee;color:#666
    }
    .tab.active{background:#fff;color:#111;box-shadow:0 4px 16px rgba(0,0,0,.08)}

    .grid{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:12px;
      margin-top:18px;
    }
    .gift{
      background:#fff;border-radius:18px;
      min-height:150px;
      display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      box-shadow:0 3px 12px rgba(0,0,0,.08);
      position:relative;
      overflow:hidden;
      animation:fade .35s ease;
    }
    @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .gift .img{
      font-size:62px;
      filter:drop-shadow(0 8px 8px rgba(0,0,0,.18));
      animation:float 2.2s infinite ease-in-out;
    }
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
    .price{
      margin-top:14px;
      background:#fff1c9;color:#bf7b00;
      padding:7px 16px;border-radius:999px;
      font-weight:900;font-size:16px;
    }
    .badge{
      position:absolute;top:8px;left:8px;
      font-size:10px;font-weight:900;
      padding:5px 7px;border-radius:999px;
      color:white;
    }
    .common{background:#8892a8}
    .rare{background:#2b9cff}
    .epic{background:#9b4dff}
    .legend{background:#ff9d00}
    .mythic{background:#ff2d82}

    .rouletteBox{
      display:none;
      position:fixed;left:0;right:0;bottom:0;top:0;
      background:rgba(0,0,0,.55);
      z-index:50;
      padding:22px 14px;
      align-items:center;
      justify-content:center;
    }
    .modal{
      width:100%;max-width:430px;
      background:#11162d;color:white;
      border-radius:30px;
      padding:18px;
      box-shadow:0 25px 80px rgba(0,0,0,.45);
      text-align:center;
    }
    .roulette{
      height:118px;background:#080b18;border-radius:24px;
      overflow:hidden;position:relative;margin:18px 0;
      border:1px solid rgba(255,255,255,.1)
    }
    .pointer{
      position:absolute;left:50%;top:0;bottom:0;width:4px;
      transform:translateX(-50%);
      background:#ffd400;z-index:5;
      box-shadow:0 0 18px #ffd400;
    }
    .items{
      display:flex;gap:10px;padding:13px;
      transition:transform 4s cubic-bezier(.12,.85,.16,1);
    }
    .rItem{
      min-width:88px;height:92px;border-radius:20px;
      display:flex;align-items:center;justify-content:center;
      font-size:46px;background:#202746;
      border:2px solid rgba(255,255,255,.1);
    }
    .win{
      display:none;
      background:#fff;color:#111;border-radius:24px;
      padding:18px;margin-top:14px;
      animation:pop .35s ease;
    }
    @keyframes pop{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}
    .winEmoji{font-size:74px}
    .winName{font-size:25px;font-weight:900;margin-top:8px}
    .btn{
      width:100%;border:0;border-radius:18px;
      padding:15px;font-size:17px;font-weight:900;
      margin-top:10px;
    }
    .openBtn{background:linear-gradient(135deg,#ffd000,#ff8a00);color:#111}
    .battleBtn{background:linear-gradient(135deg,#ff006e,#7b2cff);color:white}
    .closeBtn{background:#242b4a;color:white}

    .nav{
      position:fixed;left:12px;right:12px;bottom:12px;
      background:white;border-radius:24px;
      display:grid;grid-template-columns:repeat(3,1fr);
      padding:8px;box-shadow:0 8px 28px rgba(0,0,0,.15);
      z-index:30;
    }
    .nav button{
      border:0;background:transparent;border-radius:16px;
      padding:10px 4px;font-weight:800;color:#777;
    }
    .nav .active{background:#f0f1f5;color:#111}
  </style>
</head>

<body>
  <div class="hero">
    <div class="stars"></div>
    <div class="balance">Balance<br>⭐ 100</div>
    <div class="avatar">👤</div>
    <h1>Buy a gift</h1>
    <div class="sub">Buy yourself a gift to add to your profile<br>or win it from a case.</div>
    <div class="tabs">
      <button class="tab active" onclick="showTab('gifts')">All Gifts</button>
      <button class="tab" onclick="showTab('inventory')">Inventory</button>
    </div>
  </div>

  <div class="app">
    <div class="grid" id="giftGrid"></div>
  </div>

  <div class="rouletteBox" id="rouletteBox">
    <div class="modal">
      <h2 id="modalTitle">Opening Gift Case</h2>

      <div class="roulette">
        <div class="pointer"></div>
        <div class="items" id="items"></div>
      </div>

      <div class="win" id="win">
        <div class="winEmoji" id="winEmoji">🎁</div>
        <div class="winName" id="winName">Gift</div>
        <div id="winPrice">⭐ 15</div>
      </div>

      <button class="btn openBtn" onclick="spinGift()">🎰 Open Case 10⭐</button>
      <button class="btn battleBtn" onclick="battle()">⚔️ Battle 1x1</button>
      <button class="btn closeBtn" onclick="closeModal()">Close</button>
    </div>
  </div>

  <div class="nav">
    <button class="active" onclick="showTab('gifts')">🎁 Gifts</button>
    <button onclick="openCaseModal()">🎰 Case</button>
    <button onclick="showTab('inventory')">🎒 Inventory</button>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const gifts = [
      {emoji:"💖", name:"Heart", price:15, rarity:"common"},
      {emoji:"🧸", name:"Bear", price:15, rarity:"common"},
      {emoji:"🎁", name:"Box", price:25, rarity:"rare"},
      {emoji:"🌹", name:"Rose", price:25, rarity:"rare"},
      {emoji:"🎂", name:"Cake", price:50, rarity:"epic"},
      {emoji:"💐", name:"Flowers", price:50, rarity:"epic"},
      {emoji:"🚀", name:"Rocket", price:50, rarity:"epic"},
      {emoji:"🏆", name:"Trophy", price:100, rarity:"legend"},
      {emoji:"💍", name:"Ring", price:100, rarity:"legend"},
      {emoji:"👑", name:"Crown", price:250, rarity:"mythic"},
      {emoji:"💎", name:"Diamond", price:500, rarity:"mythic"},
      {emoji:"🦄", name:"Unicorn", price:500, rarity:"mythic"}
    ];

    let inventory = JSON.parse(localStorage.getItem("inventory") || "[]");

    function render(list){
      const grid = document.getElementById("giftGrid");
      grid.innerHTML = "";
      list.forEach(g => {
        const card = document.createElement("div");
        card.className = "gift";
        card.onclick = () => openCaseModal();
        card.innerHTML = `
          <div class="badge ${g.rarity}">${g.rarity.toUpperCase()}</div>
          <div class="img">${g.emoji}</div>
          <div class="price">⭐ ${g.price}</div>
        `;
        grid.appendChild(card);
      });
    }

    function showTab(tab){
      document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
      if(tab === "gifts"){
        document.querySelectorAll(".tab")[0].classList.add("active");
        render(gifts);
      }else{
        document.querySelectorAll(".tab")[1].classList.add("active");
        render(inventory.length ? inventory : [{emoji:"🎒",name:"Empty",price:0,rarity:"common"}]);
      }
    }

    function openCaseModal(){
      document.getElementById("rouletteBox").style.display = "flex";
      fillRoulette(gifts[0]);
    }

    function closeModal(){
      document.getElementById("rouletteBox").style.display = "none";
    }

    function weightedGift(){
      const pool = [
        ...Array(35).fill(gifts[0]),
        ...Array(30).fill(gifts[1]),
        ...Array(18).fill(gifts[2]),
        ...Array(10).fill(gifts[4]),
        ...Array(5).fill(gifts[7]),
        ...Array(2).fill(gifts[10])
      ];
      return pool[Math.floor(Math.random()*pool.length)];
    }

    function fillRoulette(winner){
      const items = document.getElementById("items");
      items.innerHTML = "";
      let arr = [];
      for(let i=0;i<42;i++){
        arr.push(gifts[Math.floor(Math.random()*gifts.length)]);
      }
      arr[36] = winner;

      arr.forEach(g=>{
        const item = document.createElement("div");
        item.className = "rItem";
        item.textContent = g.emoji;
        items.appendChild(item);
      });
    }

    function spinGift(){
      const winner = weightedGift();
      const items = document.getElementById("items");
      const win = document.getElementById("win");

      win.style.display = "none";
      fillRoulette(winner);

      items.style.transition = "none";
      items.style.transform = "translateX(0px)";

      setTimeout(()=>{
        const itemWidth = 98;
        const offset = 36 * itemWidth - window.innerWidth/2 + 62;
        items.style.transition = "transform 4s cubic-bezier(.12,.85,.16,1)";
        items.style.transform = `translateX(-${offset}px)`;
      },80);

      setTimeout(()=>{
        document.getElementById("winEmoji").textContent = winner.emoji;
        document.getElementById("winName").textContent = winner.name;
        document.getElementById("winPrice").textContent = "⭐ " + winner.price;
        win.style.display = "block";

        inventory.unshift(winner);
        localStorage.setItem("inventory", JSON.stringify(inventory));

        tg.sendData(JSON.stringify({
          action:"open_case",
          case_id:1,
          gift_name:winner.name,
          gift_price:winner.price,
          gift_rarity:winner.rarity
        }));
      },4300);
    }

    function battle(){
      spinGift();
      setTimeout(()=>{
        tg.sendData(JSON.stringify({
          action:"battle_case",
          case_id:1
        }));
      },4500);
    }

    render(gifts);
  </script>
</body>
</html>
