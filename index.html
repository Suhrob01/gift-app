<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <title>Gift Battle</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at top, #39236d, transparent 35%),
        linear-gradient(180deg, #090b18, #111429);
      color: white;
      overflow-x: hidden;
    }

    .app {
      padding: 18px;
      padding-bottom: 90px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
    }

    .title {
      font-size: 26px;
      font-weight: 800;
    }

    .balance {
      background: #1b1f3a;
      padding: 9px 13px;
      border-radius: 999px;
      font-weight: bold;
    }

    .profile {
      background: linear-gradient(135deg, #24294b, #171a31);
      border-radius: 24px;
      padding: 15px;
      margin-bottom: 18px;
    }

    .username {
      font-size: 18px;
      font-weight: bold;
    }

    .small {
      color: #a9adc8;
      font-size: 13px;
      margin-top: 4px;
    }

    .roulette-card {
      background: linear-gradient(180deg, #202547, #111429);
      border-radius: 28px;
      padding: 18px;
      margin-bottom: 18px;
      text-align: center;
    }

    .case-img {
      font-size: 86px;
      margin: 15px 0;
      animation: float 2s ease-in-out infinite;
    }

    @keyframes float {
      0% { transform: translateY(0) rotate(-2deg); }
      50% { transform: translateY(-8px) rotate(2deg); }
      100% { transform: translateY(0) rotate(-2deg); }
    }

    .roulette {
      height: 90px;
      background: #0c0f22;
      border-radius: 20px;
      overflow: hidden;
      margin: 18px 0;
      position: relative;
    }

    .pointer {
      position: absolute;
      top: 0;
      left: 50%;
      width: 3px;
      height: 100%;
      background: #ffd000;
      z-index: 5;
      box-shadow: 0 0 14px #ffd000;
    }

    .items {
      display: flex;
      gap: 10px;
      padding: 12px;
      transform: translateX(0);
      transition: transform 2.5s cubic-bezier(.15,.85,.25,1);
    }

    .item {
      min-width: 74px;
      height: 66px;
      background: linear-gradient(135deg, #2f3565, #1a1f3d);
      border-radius: 17px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
    }

    button {
      width: 100%;
      border: none;
      border-radius: 18px;
      padding: 15px;
      font-size: 17px;
      font-weight: 800;
      margin-top: 10px;
    }

    .open {
      background: linear-gradient(135deg, #ffd000, #ff8a00);
      color: #151515;
    }

    .battle {
      background: linear-gradient(135deg, #ff006e, #7b2cff);
      color: white;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .mini-card {
      background: #171b34;
      border-radius: 22px;
      padding: 15px;
      min-height: 96px;
    }

    .bottom-nav {
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: 12px;
      background: rgba(18, 21, 42, 0.95);
      border-radius: 24px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      padding: 8px;
    }

    .nav-btn {
      background: transparent;
      color: #b9bdd6;
      font-size: 13px;
      padding: 9px 4px;
      border-radius: 16px;
      margin-top: 0;
    }

    .nav-btn.active {
      background: #24294b;
      color: white;
    }

    .toast {
      position: fixed;
      left: 18px;
      right: 18px;
      top: 18px;
      background: #1f2445;
      color: white;
      border-radius: 18px;
      padding: 14px;
      text-align: center;
      transform: translateY(-120px);
      transition: 0.3s;
      z-index: 50;
    }

    .toast.show {
      transform: translateY(0);
    }
  </style>
</head>

<body>
  <div class="toast" id="toast">Сообщение</div>

  <div class="app">
    <div class="header">
      <div class="title">🎁 Gift Battle</div>
      <div class="balance">100⭐</div>
    </div>

    <div class="profile">
      <div class="username" id="user">Игрок</div>
      <div class="small">Открывай кейсы и участвуй в battle</div>
    </div>

    <div class="roulette-card">
      <div class="case-img">🎁</div>
      <h2>Basic Case</h2>
      <p class="small">Цена открытия: 10⭐</p>

      <div class="roulette">
        <div class="pointer"></div>
        <div class="items" id="items">
          <div class="item">💎</div>
          <div class="item">🎖️</div>
          <div class="item">🔥</div>
          <div class="item">🎁</div>
          <div class="item">⭐</div>
          <div class="item">💰</div>
          <div class="item">🏆</div>
          <div class="item">🎉</div>
          <div class="item">💎</div>
          <div class="item">🔥</div>
        </div>
      </div>

      <button class="open" onclick="openCase(1)">🎁 Открыть кейс</button>
      <button class="battle" onclick="battleCase(1)">⚔️ Battle 1x1</button>
    </div>

    <div class="grid">
      <div class="mini-card">
        <h3>🏆 TOP</h3>
        <div class="small">Рейтинг игроков смотри в боте</div>
      </div>

      <div class="mini-card">
        <h3>👥 Рефералы</h3>
        <div class="small">Приглашай друзей и получай бонус</div>
      </div>
    </div>
  </div>

  <div class="bottom-nav">
    <button class="nav-btn active">🎁 Кейсы</button>
    <button class="nav-btn" onclick="sendBot('top')">🏆 Топ</button>
    <button class="nav-btn" onclick="sendBot('profile')">👤 Профиль</button>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const user = tg.initDataUnsafe.user;

    if (user) {
      document.getElementById("user").innerText =
        "@" + (user.username || user.first_name);
    }

    function toast(text) {
      const el = document.getElementById("toast");
      el.innerText = text;
      el.classList.add("show");
      setTimeout(() => el.classList.remove("show"), 1800);
    }

    function spinRoulette() {
      const items = document.getElementById("items");
      items.style.transition = "none";
      items.style.transform = "translateX(0px)";

      setTimeout(() => {
        items.style.transition = "transform 2.5s cubic-bezier(.15,.85,.25,1)";
        items.style.transform = "translateX(-520px)";
      }, 50);
    }

    function openCase(caseId) {
      spinRoulette();
      toast("🎁 Открываем кейс...");

      setTimeout(() => {
        tg.sendData(JSON.stringify({
          action: "open_case",
          case_id: caseId
        }));
      }, 2500);
    }

    function battleCase(caseId) {
      spinRoulette();
      toast("⚔️ Запускаем battle...");

      setTimeout(() => {
        tg.sendData(JSON.stringify({
          action: "battle_case",
          case_id: caseId
        }));
      }, 2500);
    }

    function sendBot(action) {
      tg.sendData(JSON.stringify({
        action: action,
        case_id: 1
      }));
    }
  </script>
</body>
</html>
